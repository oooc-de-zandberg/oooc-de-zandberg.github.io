# Site settings
title: De Zandberg
email: info@zandberg.be
description: >-
  Gemaakt door Tom Kerkhove.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.zandberg.be"
lang: nl-BE
logo: /assets/images/logos/transparant.png
tagline: Jeugdvoorziening in Brugge – diagnostiek, crisisopvang en begeleiding

# Build settings
markdown: kramdown
theme: minima # Using the minima theme which is Jekyll's default
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

facebook_username: ooocdezandberg

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - .github

# Collections
# collections:
#   staff:
#     output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

header_pages:
  - missie.md
  - ons-aanbod.md
  - professionelen.md
  - werk-bij-ons.md
  - partners.md
  - steun-ons.md
  - contact.md
